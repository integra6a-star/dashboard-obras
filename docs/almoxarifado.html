<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Almoxarifado</title>

<link rel="icon" href="../icon.png" sizes="1024x1024" type="image/png"/>
<link rel="shortcut icon" href="../icon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="../icon-180.png"/>
<meta name="theme-color" content="#2f6fe4"/>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
  display:flex;
}

/* Sidebar padrão */
.sidebar{
  width:220px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:15px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:5px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
  border-radius:8px;
}

.sidebar a:hover{
  background:#eef5ff;
  color:#2f6fe4;
}

.container {
  flex:1;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn{
  background:#2f6fe4;
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.qtd {
  text-align: right;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <a href="../index.html">🏠 Início</a>
  <a href="../mapa.html">🗺️ Mapa</a>
  <a href="../tubos.html">🛢️ Tubos</a>
  <a href="../almoxarifado.html" style="background:#eef5ff;color:#2f6fe4;">📦 Almoxarifado</a>
</div>

<div class="container">

<div class="top">
  <h1>📦 Almoxarifado</h1>
  <a href="../index.html" class="btn">⬅ Voltar</a>
</div>

<div class="card">

<input type="text" id="filtro" placeholder="Buscar material...">

<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>
</div>

<script>
async function carregarDados() {
  const resp = await fetch("./almoxarifado.json?v=" + new Date().getTime());
  const dados = await resp.json();

  renderTabela(dados);

  document.getElementById("filtro").addEventListener("input", (e) => {
    const texto = e.target.value.toLowerCase();
    const filtrado = dados.filter(item =>
      item.descricao.toLowerCase().includes(texto) ||
      item.codigo.toLowerCase().includes(texto)
    );
    renderTabela(filtrado);
  });
}

function renderTabela(lista) {
  const tbody = document.getElementById("tabela");
  tbody.innerHTML = "";

  lista.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.codigo}</td>
      <td>${item.descricao}</td>
      <td class="qtd">${item.quantidade}</td>
    `;

    tbody.appendChild(tr);
  });
}

carregarDados();
</script>

</body>
</html>
