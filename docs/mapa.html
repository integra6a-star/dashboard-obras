<body>
  <div class="topo"><div class="topo-title"><h1>Mapa Real Georreferenciado - Todas as Obras</h1><p>Visualização consolidada das redes carregadas pela planilha.</p></div><a class="btn-voltar" href="./index.html">🏠 Voltar ao dashboard</a></div>
  <main class="layout">
    <section id="map"></section>
    <aside>
      <div class="linha"><select id="obraSel"></select></div>
      <div class="linha"><button id="btnCenter">Centralizar obra</button><select id="metodoSel"><option value="">Todos os métodos</option></select></div>
      <div class="linha"><select id="materialSel"><option value="">Todos os materiais</option></select></div>
      <div class="ok" id="fonte">Carregando planilha...</div>
      <h2>Insights técnicos</h2><div class="insights" id="insightsEngenharia"></div>
      <h2>Resumo da obra selecionada</h2><div class="cards" id="cardsObra"></div>
      <h2>Resumo geral - todas as obras</h2><div class="cards" id="cardsGeral"></div>
      <h2>Legenda</h2>
      <div class="legenda">
        <div class="leg"><span class="linha-leg" style="background:#1764d8"></span>MND / PEAD</div>
        <div class="leg"><span class="linha-leg" style="background:#ff7a00"></span>VCA / PVC</div>
        <div class="leg"><span class="linha-leg" style="background:#111"></span>Outros</div>
        <div class="leg"><span class="ponto" style="background:#061326"></span>PV</div>
        <div class="leg"><span class="ponto" style="background:#8948ff"></span>PI</div>
      </div>
      <h2>Trechos da rede</h2><div class="lista" id="listaTrechos"></div>
    </aside>
  </main>
<script>
const EXCEL="planilha_base_mapa.xlsx", JSON_FALLBACK="dados_mapa.json";
const map=L.map('map',{zoomControl:true}).setView([-23.56,-46.50],13);
const baseMapa=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
let D={obras:[],pontos:[],trechos:[]}, layers=L.layerGroup().addTo(map), boundsAll=null;
const fmt=n=>(Number(n||0)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function norm(s){return String(s||'').trim()}
function num(v){if(v===null||v===undefined||v==='')return 0; if(typeof v==='number')return v; return Number(String(v).replace('.','').replace(',','.'))||0}
function tratarProfundidade(v){
  let n=num(v);
  if(n>50) n=n/100;
  if(n>15) return 0;
  return n;
}
function classeCard(titulo, valor){
  const t=String(titulo||'').toLowerCase();
  if(t.includes('risco') && String(valor).toLowerCase().includes('alto')) return ' alerta';
  if(t.includes('crítico') || t.includes('critico')) return Number(valor||0)>0?' alerta':' sucesso';
  if(t.includes('mnd') || t.includes('vca') || t.includes('pv') || t.includes('pi')) return ' neutro';
  return '';
}
function cor(t){let m=norm(getv(t, ['metodo','método'])).toLowerCase(), mat=norm(getv(t, ['material'])).toLowerCase(); if(m.includes('mnd')||m.includes('não destrutivo')||mat.includes('pead'))return '#1764d8'; if(m.includes('vca')||m.includes('vala')||mat.includes('pvc'))return '#ff7a00'; return '#111'}
function card(t,v,u=''){return `<div class="card${classeCard(t,v)}"><div class="t">${t}</div><div class="v">${v}</div>${u?`<div class="u">${u}</div>`:''}</div>`}
async function carregar(){
  try{
    const r=await fetch(EXCEL,{cache:'no-store'}); if(!r.ok) throw new Error('excel');
    const buf=await r.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'});
    const aba=n=>XLSX.utils.sheet_to_json(wb.Sheets[n]||{}, {defval:null});
    D={obras:aba('OBRAS'),pontos:aba('PONTOS'),trechos:aba('TRECHOS')};
    fonte.textContent='Fonte: planilha_base_mapa.xlsx';
  }catch(e){
    const r=await fetch(JSON_FALLBACK,{cache:'no-store'}); D=await r.json();
    fonte.textContent='Fonte: dados_mapa.json';
  }
  iniciar();
}
let obraIndex = {};
function slug(s){
  return String(s||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}
function canonObraId(s){
  let x = slug(s).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');

  // Remove sufixos de bloco/trecho sem transformar cada trecho em obra
  x = x.replace(/_blocos?_\d+_a_\d+.*$/, '');
  x = x.replace(/_blocos?_\d+.*$/, '');
  x = x.replace(/_trecho_[0-9ivx]+.*$/, '');
  x = x.replace(/_bloco[s]?_\d+.*$/, '');
  x = x.replace(/_bloco[s]?$/, '');

  // ===== EQUIVALÊNCIAS REAIS DA PLANILHA =====
  // Pacheco Jordão aparece como "pacheco" na OBRAS e "Intereligação_Pacheco_Jordão" nos TRECHOS
  if(x.includes('pacheco_jordao') || x.includes('pacheco')) return 'pacheco';

  // Lageado aparece na OBRAS como lageado_montante_bl54_55_56
  // e nos trechos/pontos como ct_lageado_montante_bl54_55_57, 58, 59...
  if(x.includes('lageado_montante_bl54_55')) return 'lageado_montante_bl54_55_56';

  // Domingos
  if(x.includes('domingos')) return 'ct_domingos';

  // Conceição
  if(x.includes('conceicao')) return 'conceicao';

  // Benfica
  if(x.includes('benfica')) return 'ct_benfica';

  // Jardim Miriam deve ser uma obra principal, não trecho por trecho
  if(x.includes('jardim_miriam') || x.includes('jd_miriam') || x.includes('miriam')) return 'ct_jardim_miriam_blocos_05_a_09';

  // Água Vermelha
  if(x === 'agua' || x.includes('agua_vermelha')) return 'agua';
  if(x.includes('agua_md')) return 'agua_md';
  if(x.includes('agua_boa')) return 'agua_boa';

  return x;
}
function displayObra(s){
  return String(s||'').toUpperCase();
}
function getv(obj, nomes){
  if(!obj) return '';
  const keys = Object.keys(obj);
  const mapa = {};
  keys.forEach(k => mapa[slug(k)] = k);
  for(const nome of nomes){
    const k = mapa[slug(nome)];
    if(k !== undefined) return obj[k];
  }
  return '';
}
function obraNomePorId(id){
  const o = obraIndex[String(id)] || obraIndex[canonObraId(id)] || {};
  return norm(getv(o, ['nome_obra','obra','nome','descricao','descrição']));
}
function obraSelecionadaNome(){
  const opt = obraSel.options[obraSel.selectedIndex];
  return opt ? norm(opt.textContent) : '';
}
function itemPertenceObra(item, obraId){
  if(!obraId) return true;
  const idItem = norm(getv(item, ['obra_id','id_obra','codigo_obra','código_obra']));
  const nomeItem = norm(getv(item, ['nome_obra','obra','obra_nome','frente','nome']));
  const nomeDoIdItem = obraNomePorId(idItem);
  return canonObraId(idItem || nomeItem || nomeDoIdItem) === canonObraId(obraId);
}
function valCoord(item, nomes){
  return num(getv(item, nomes));
}
function iniciar(){
  obraIndex = {};
  const grupos = new Map();

  function registrarObra(id, nome, prioridade=false){
    const rawId = norm(id || nome);
    if(!rawId) return;
    const canon = canonObraId(rawId || nome);
    if(!canon) return;

    if(!grupos.has(canon)){
      grupos.set(canon, {
        id: canon,
        nome: displayObra(nome || rawId || canon),
        canon
      });
    }

    // Nome da aba OBRAS tem prioridade visual
    if(prioridade && nome){
      grupos.get(canon).nome = displayObra(nome);
    }
  }

  (D.obras||[]).forEach(o=>{
    const id = norm(getv(o, ['obra_id','id','codigo','código']));
    const nome = norm(getv(o, ['nome_obra','obra','nome','descricao','descrição'])) || id;

    if(id){
      obraIndex[String(id)] = o;
      obraIndex[canonObraId(id)] = o;
    }

    registrarObra(id, nome, true);
  });

  // Só adiciona obra extra se ela existir nos dados, mas agrupada por obra principal
  (D.trechos||[]).forEach(t=>{
    const id = norm(getv(t, ['obra_id','id_obra','codigo_obra','código_obra']));
    registrarObra(id, obraNomePorId(id) || id, false);
  });

  (D.pontos||[]).forEach(p=>{
    const id = norm(getv(p, ['obra_id','id_obra','codigo_obra','código_obra']));
    registrarObra(id, obraNomePorId(id) || id, false);
  });

  const obrasAtivas = Array.from(grupos.values()).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

  obraSel.innerHTML='<option value="">TODAS AS OBRAS</option>'+obrasAtivas.map(o=>`<option value="${String(o.id).replace(/"/g,'&quot;')}">${o.nome}</option>`).join('');
  metodoSel.innerHTML='<option value="">Todos os métodos</option>'+Array.from(new Set((D.trechos||[]).map(t=>norm(getv(t, ['metodo','método']))).filter(Boolean))).sort().map(x=>`<option>${x}</option>`).join('');
  materialSel.innerHTML='<option value="">Todos os materiais</option>'+Array.from(new Set((D.trechos||[]).map(t=>norm(getv(t, ['material']))).filter(Boolean))).sort().map(x=>`<option>${x}</option>`).join('');

  [obraSel,metodoSel,materialSel].forEach(el=>el.onchange=render);
  btnCenter.onclick=()=>{if(boundsAll)map.fitBounds(boundsAll,{padding:[25,25]})};
  render();
}
function filtrarTrechos(){
  return (D.trechos||[]).filter(t=>
    itemPertenceObra(t, obraSel.value)
    && (!metodoSel.value || norm(getv(t, ['metodo','método']))==metodoSel.value)
    && (!materialSel.value || norm(getv(t, ['material']))==materialSel.value)
  );
}
function resumo(trechos, pontos){
  let ext=trechos.reduce((s,t)=>s+num(getv(t, ['extensao_m','extensão_m','extensao','extensão','comprimento_m'])),0),
      mnd=trechos.filter(t=>cor(t)=='#1764d8').reduce((s,t)=>s+num(getv(t, ['extensao_m','extensão_m','extensao','extensão','comprimento_m'])),0),
      vca=trechos.filter(t=>cor(t)=='#ff7a00').reduce((s,t)=>s+num(getv(t, ['extensao_m','extensão_m','extensao','extensão','comprimento_m'])),0);
  let profs=[...trechos.flatMap(t=>[tratarProfundidade(getv(t, ['prof_inicial_m','profundidade_inicial_m','prof_inicio_m'])),tratarProfundidade(getv(t, ['prof_final_m','profundidade_final_m','prof_fim_m'])),tratarProfundidade(getv(t, ['prof_max_m','profundidade_max_m','profundidade_m']))]),...pontos.map(p=>tratarProfundidade(getv(p, ['profundidade_m','profundidade','prof'])))].filter(x=>x>0);
  let criticos=profs.filter(x=>x>=6).length;
  let media=profs.length?profs.reduce((a,b)=>a+b,0)/profs.length:0;
  let percMnd=ext?mnd/ext*100:0;
  let risco=(media>=5 || percMnd>=80 || criticos>=10) ? 'Alto' : (media>=3 || percMnd>=50 || criticos>=3) ? 'Médio' : 'Baixo';
  return {trechos:trechos.length, ext, mnd, vca, maior:profs.length?Math.max(...profs):0, pv:pontos.filter(p=>norm(getv(p, ['tipo_ponto','tipo','classificacao','classificação'])).toUpperCase()=='PV').length, pi:pontos.filter(p=>norm(getv(p, ['tipo_ponto','tipo','classificacao','classificação'])).toUpperCase()=='PI').length, soma:profs.reduce((a,b)=>a+b,0), media, criticos, percMnd, risco}
}
function render(){
  layers.clearLayers(); let trechos=filtrarTrechos(); let obra=obraSel.value; let pontos=(D.pontos||[]).filter(p=>itemPertenceObra(p, obra)); let group=[];
  trechos.forEach(t=>{
    let a=[valCoord(t, ['lat_inicio','latitude_inicio','lat_ini']),valCoord(t, ['lon_inicio','lng_inicio','longitude_inicio','lon_ini'])], b=[valCoord(t, ['lat_fim','latitude_fim','lat_final']),valCoord(t, ['lon_fim','lng_fim','longitude_fim','lon_final'])];
    if(a[0]&&a[1]&&b[0]&&b[1]){let l=L.polyline([a,b],{color:cor(t),weight:4,opacity:.92}).bindPopup(`<b>${getv(t, ['trecho_id','id_trecho','codigo_trecho','código_trecho'])}</b><br>${getv(t, ['trecho_nome','nome_trecho','trecho'])||''}<br>${fmt(num(getv(t, ['extensao_m','extensão_m','extensao','extensão','comprimento_m'])))} m`); l.addTo(layers); group.push(a,b)}
  });
  pontos.forEach(p=>{let la=valCoord(p, ['latitude','lat']),lo=valCoord(p, ['longitude','lon','lng']); if(!la||!lo)return; let isPI=norm(getv(p, ['tipo_ponto','tipo','classificacao','classificação'])).toUpperCase()=='PI'; L.circleMarker([la,lo],{radius:5,color:'#fff',weight:1,fillColor:isPI?'#8948ff':'#061326',fillOpacity:1}).bindPopup(`<b>${getv(p, ['nome_ponto','ponto','ponto_id','nome'])||getv(p, ['ponto_id','id_ponto'])}</b><br>${getv(p, ['tipo_ponto','tipo','classificacao','classificação'])||''}<br>Prof.: ${fmt(tratarProfundidade(getv(p, ['profundidade_m','profundidade','prof'])))} m`).addTo(layers); group.push([la,lo])});
  if(group.length){boundsAll=L.latLngBounds(group); map.fitBounds(boundsAll,{padding:[20,20]})} else {boundsAll=null;}
  let robra=resumo(trechos,pontos), geral=resumo(D.trechos,D.pontos);
  cardsObra.innerHTML=card('Trechos',robra.trechos)+card('Extensão total',fmt(robra.ext),'m')+card('Extensão MND',fmt(robra.mnd),'m')+card('% MND',fmt(robra.percMnd),'%')+card('Maior profundidade',fmt(robra.maior),'m')+card('Prof. média',fmt(robra.media),'m')+card('Pontos críticos',robra.criticos,'prof. ≥ 6 m')+card('Risco técnico',robra.risco);
  cardsGeral.innerHTML=card('Total de obras',D.obras.length)+card('Total de trechos',geral.trechos)+card('Extensão geral',fmt(geral.ext),'m')+card('Maior prof. geral',fmt(geral.maior),'m')+card('Prof. média geral',fmt(geral.media),'m')+card('Pontos críticos',geral.criticos,'prof. ≥ 6 m')+card('Total PV',geral.pv)+card('Total PI',geral.pi)+card('Soma profundidades',fmt(geral.soma),'m')+card('Total MND',fmt(geral.mnd),'m')+card('Total VCA',fmt(geral.vca),'m')+card('Risco geral',geral.risco);
  if(document.getElementById('insightsEngenharia')){
    let foco = obraSel.value ? robra : geral;
    let msg1 = foco.risco==='Alto' ? 'risco' : (foco.risco==='Médio' ? 'alerta' : '');
    insightsEngenharia.innerHTML =
      `<div class="insight ${msg1}">🧠 <b>Risco técnico:</b> ${foco.risco} | Profundidade média ${fmt(foco.media)} m | Maior profundidade ${fmt(foco.maior)} m</div>`+
      `<div class="insight">🛠️ <b>Método:</b> MND representa ${fmt(foco.percMnd)}% da extensão filtrada.</div>`+
      `<div class="insight ${foco.criticos>0?'alerta':''}">⚠️ <b>Pontos críticos:</b> ${foco.criticos} registros com profundidade igual ou acima de 6 m.</div>`;
  }
  listaTrechos.innerHTML=trechos.slice(0,80).map(t=>`<div class="trecho"><b>${getv(t, ['trecho_id','id_trecho','codigo_trecho','código_trecho'])||''}</b><br><span class="muted">${getv(t, ['trecho_nome','nome_trecho','trecho'])||''}</span><br>${getv(t, ['material'])||''} · DN ${getv(t, ['dn','diametro','diâmetro'])||''}<br>Extensão: ${fmt(num(getv(t, ['extensao_m','extensão_m','extensao','extensão','comprimento_m'])))} m | Prof.: ${fmt(tratarProfundidade(getv(t, ['prof_inicial_m','profundidade_inicial_m','prof_inicio_m'])))} / ${fmt(tratarProfundidade(getv(t, ['prof_final_m','profundidade_final_m','prof_fim_m'])))} m</div>`).join('') || '<div class="muted">Nenhum trecho encontrado.</div>';
}
carregar();
</script>
</body>
