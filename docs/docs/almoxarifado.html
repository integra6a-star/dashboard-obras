<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Almoxarifado</title>

<link rel="icon" href="./icon.png" sizes="1024x1024" type="image/png"/>
<link rel="shortcut icon" href="./icon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png"/>
<meta name="theme-color" content="#2f6fe4"/>

<style>
:root{
  --azul:#2f6fe4;
  --azul-escuro:#062765;
  --bg:#f4f6f9;
  --texto:#111827;
  --muted:#64748b;
  --line:#d9dee8;
  --ok:#15803d;
  --zero:#b91c1c;
  --note:#a16207;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--texto);
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:220px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:15px;
  flex-shrink:0;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:5px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
  border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
  background:#eef5ff;
  color:var(--azul);
}

.container{
  flex:1;
  padding:20px;
  overflow:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:18px;
}

.top h1{ margin:0; font-size:26px; }
.meta{ margin-top:6px; color:var(--muted); font-size:13px; font-weight:bold; }

.btn,
.btn-canteiro{
  background:var(--azul);
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  border:none;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(47,111,228,.18);
}

.btn-canteiro.ativo{ background:var(--azul-escuro); }

.btn-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(4, minmax(150px, 1fr));
  gap:14px;
  margin-bottom:16px;
}

.kpi{
  background:#fff;
  border-radius:8px;
  padding:15px;
  border:1px solid #e8edf5;
  box-shadow:0 4px 14px rgba(15,23,42,.05);
}

.kpi .label{
  color:var(--muted);
  font-size:13px;
  font-weight:bold;
  margin-bottom:8px;
}

.kpi .valor{
  font-size:26px;
  font-weight:900;
}

.kpi.total .valor{ color:var(--azul-escuro); }
.kpi.ok .valor{ color:var(--ok); }
.kpi.zero .valor{ color:var(--zero); }
.kpi.note .valor{ color:var(--note); }

.card{
  background:#fff;
  padding:15px;
  border-radius:8px;
  border:1px solid #e8edf5;
  box-shadow:0 4px 14px rgba(15,23,42,.05);
  margin-bottom:16px;
}

.filtros{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.titulo-card{
  font-weight:900;
  color:var(--azul-escuro);
  font-size:17px;
}

#filtro{
  width:320px;
  max-width:100%;
  padding:10px 12px;
  border:1px solid #b8c2d3;
  border-radius:8px;
  outline:none;
}

.tabela-wrap{ overflow:auto; border-radius:8px; }

table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

th{
  background:var(--azul-escuro);
  color:white;
  padding:10px;
  font-size:14px;
  border:1px solid #fff;
  text-align:left;
}

td{
  padding:9px 10px;
  border:1px solid #fff;
  font-size:14px;
}

tbody tr:nth-child(odd) td{ background:#bfbfbf; }
tbody tr:nth-child(even) td{ background:#e6e6e6; }

.estoque{
  text-align:right;
  font-weight:bold;
  white-space:nowrap;
}

.indicador{
  width:34px;
  text-align:center;
}

.dot{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--zero);
}

.dot.ok{ background:var(--ok); }
.dot.note{ background:var(--note); }

.msg{
  padding:18px;
  text-align:center;
  color:var(--muted);
  font-weight:bold;
}

@media(max-width:900px){
  body{ display:block; }
  .sidebar{ width:100%; display:flex; gap:8px; overflow:auto; border-right:none; border-bottom:1px solid #ddd; }
  .sidebar a{ white-space:nowrap; margin-bottom:0; }
  .cards{ grid-template-columns:repeat(2, minmax(140px, 1fr)); }
  .top{ flex-direction:column; }
}

@media(max-width:520px){
  .cards{ grid-template-columns:1fr; }
  .container{ padding:12px; }
  .btn-group{ display:grid; grid-template-columns:1fr; }
  .filtros{ align-items:flex-start; flex-direction:column; }
}
</style>
</head>

<body>

<div class="sidebar">
  <a href="./index.html">Inicio</a>
  <a href="./mapa.html">Mapa</a>
  <a href="./tubos.html">Tubos</a>
  <a href="./almoxarifado.html" class="active">Almoxarifado</a>
</div>

<div class="container">

  <div class="top">
    <div>
      <h1>Almoxarifado</h1>
      <div class="meta" id="metaAtualizacao"></div>
    </div>
    <a href="./index.html" class="btn">Voltar</a>
  </div>

  <div class="btn-group">
    <button class="btn-canteiro ativo" id="btn-canteiro1" onclick="trocarCanteiro('canteiro1')">Tancredo / Canteiro 1</button>
    <button class="btn-canteiro" id="btn-canteiro2" onclick="trocarCanteiro('canteiro2')">Bandeirantes / Canteiro 2</button>
    <button class="btn-canteiro" id="btn-iti15" onclick="trocarCanteiro('iti15')">D&#39;av&oacute; / ITI-15</button>
  </div>

  <div class="cards">
    <div class="kpi total"><div class="label">Total de materiais</div><div class="valor" id="kpiTotal">0</div></div>
    <div class="kpi ok"><div class="label">Com estoque</div><div class="valor" id="kpiOk">0</div></div>
    <div class="kpi zero"><div class="label">Sem estoque</div><div class="valor" id="kpiZero">0</div></div>
    <div class="kpi note"><div class="label">Observa&ccedil;&atilde;o</div><div class="valor" id="kpiTexto">0</div></div>
  </div>

  <div class="card">
    <div class="filtros">
      <div class="titulo-card" id="tituloCanteiro">Tancredo (Canteiro 1)</div>
      <input type="text" id="filtro" placeholder="Buscar material...">
    </div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th>Descri&ccedil;&atilde;o</th>
            <th style="width:180px">Estoque Atual</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  canteiro1: { titulo: "Tancredo (Canteiro 1)", arquivo: "almoxarifado_canteiro1.json" },
  canteiro2: { titulo: "Bandeirantes (Canteiro 2)", arquivo: "almoxarifado_canteiro2.json" },
  iti15: { titulo: "D'av\u00f3 (ITI-15)", arquivo: "almoxarifado_iti15.json" }
};

let dadosGlobal = [];
let canteiroAtual = "canteiro1";

function numeroEstoque(item){
  if(typeof item.quantidade === "number") return item.quantidade;
  const texto = String(item.estoque_atual ?? item.quantidade ?? "").trim();
  const match = texto.match(/^\s*(-?\d+(?:[.,]\d+)?)/);
  if(!match) return 0;
  const n = Number(match[1].replace(".", "").replace(",", "."));
  return Number.isFinite(n) ? n : 0;
}

function estoqueTexto(item){
  const texto = String(item.estoque_atual ?? "").trim();
  if(texto) return texto;
  if(item.quantidade === 0) return "0";
  return String(item.quantidade ?? "");
}

function tipoEstoque(item){
  const texto = estoqueTexto(item);
  const temNumeroNoInicio = /^\s*-?\d/.test(texto);
  if(texto && !temNumeroNoInicio) return "note";
  return numeroEstoque(item) > 0 ? "ok" : "zero";
}

async function buscarJson(arquivo){
  const versao = "?v=" + new Date().getTime();
  const resp = await fetch("./" + arquivo + versao);
  if(!resp.ok) throw new Error("Arquivo nao encontrado");
  return await resp.json();
}

async function carregarDados(chave){
  const cfg = CONFIG[chave];
  canteiroAtual = chave;
  document.getElementById("tituloCanteiro").textContent = cfg.titulo;
  document.getElementById("metaAtualizacao").textContent = "";

  document.querySelectorAll(".btn-canteiro").forEach(btn => btn.classList.remove("ativo"));
  document.getElementById("btn-" + chave).classList.add("ativo");

  document.getElementById("tabela").innerHTML = `<tr><td colspan="3" class="msg">Carregando dados...</td></tr>`;

  try{
    const dados = await buscarJson(cfg.arquivo);
    dadosGlobal = Array.isArray(dados.produtos) ? dados.produtos : (Array.isArray(dados) ? dados : []);
    document.getElementById("tituloCanteiro").textContent = dados.titulo || cfg.titulo;
    document.getElementById("metaAtualizacao").textContent = dados.atualizado_em ? "Atualizado em " + dados.atualizado_em : "";
    aplicarFiltro();
  }catch(e){
    dadosGlobal = [];
    atualizarCards([]);
    document.getElementById("tabela").innerHTML = `<tr><td colspan="3" class="msg">Nenhum dado cadastrado para este canteiro.</td></tr>`;
  }
}

function trocarCanteiro(chave){
  document.getElementById("filtro").value = "";
  carregarDados(chave);
}

function aplicarFiltro(){
  const texto = document.getElementById("filtro").value.toLowerCase().trim();
  const filtrado = dadosGlobal.filter(item =>
    String(item.descricao ?? "").toLowerCase().includes(texto) ||
    String(item.estoque_atual ?? "").toLowerCase().includes(texto)
  );
  renderTabela(filtrado);
  atualizarCards(dadosGlobal);
}

function atualizarCards(lista){
  const total = lista.length;
  let ok = 0, zero = 0, texto = 0;

  lista.forEach(item => {
    const tipo = tipoEstoque(item);
    if(tipo === "ok") ok++;
    if(tipo === "zero") zero++;
    if(tipo === "note") texto++;
  });

  document.getElementById("kpiTotal").textContent = total;
  document.getElementById("kpiOk").textContent = ok;
  document.getElementById("kpiZero").textContent = zero;
  document.getElementById("kpiTexto").textContent = texto;
}

function renderTabela(lista){
  const tbody = document.getElementById("tabela");
  tbody.innerHTML = "";

  if(!lista.length){
    tbody.innerHTML = `<tr><td colspan="3" class="msg">Nenhum material encontrado.</td></tr>`;
    return;
  }

  lista.forEach(item => {
    const tipo = tipoEstoque(item);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="indicador"><span class="dot ${tipo === "ok" ? "ok" : tipo === "note" ? "note" : ""}"></span></td>
      <td>${item.descricao ?? ""}</td>
      <td class="estoque">${estoqueTexto(item)}</td>
    `;
    tbody.appendChild(tr);
  });
}

document.getElementById("filtro").addEventListener("input", aplicarFiltro);
carregarDados("canteiro1");
</script>

</body>
</html>
